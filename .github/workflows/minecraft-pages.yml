name: Deploy Minecraft Demo

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: minecraft/pnpm-lock.yaml

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        working-directory: minecraft
        run: pnpm install --frozen-lockfile

      - name: Build demo
        working-directory: minecraft
        run: pnpm build:demo

      - name: Package Pages site
        run: |
          rm -rf pages-site
          mkdir -p pages-site/minecraft
          cp -R minecraft/dist-demo/. pages-site/minecraft/
          cat <<'EOF' > pages-site/index.html
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <title>Redirecting…</title>
              <meta http-equiv="refresh" content="0; url=/beboppin/minecraft/" />
              <link rel="canonical" href="https://cadentj.github.io/beboppin/minecraft/" />
            </head>
            <body>
              <p><a href="/beboppin/minecraft/">Open the Minecraft demo</a></p>
            </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
